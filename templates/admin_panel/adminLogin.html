{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Society Connect</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- SHARED CSS -->
    <link rel="stylesheet" href="{% static 'core/css/navigation.css' %}">
    <link rel="stylesheet" href="{% static 'admin_panel/css/admin_global.css' %}">
    
    <!-- SPECIFIC CSS -->
    <link rel="stylesheet" href="{% static 'admin_panel/css/adminLogin.css' %}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        
        <!-- LEFT IMAGE -->
        <div class="auth-image">
            <img src="{% static 'images/img1.jpg' %}" alt="Admin Access">
        </div>

        <!-- RIGHT LOGIN -->
        <div class="auth-form-container">
            <h2>Admin Login</h2>
            <p class="auth-subtitle">Society Connect Control Panel</p>

            <form method="POST" class="auth-form">
                {% csrf_token %}

                {% if error %}
                    <div class="sc-alert sc-alert-error">
                        <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
                    </div>
                {% endif %}

                <div class="sc-input-group">
                    <i class="fa-solid fa-user-tie"></i>
                    <input type="text" name="username" placeholder="Admin Username" required>
                </div>

                <div class="sc-input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="button" class="password-toggle" data-toggle="password">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

                <!-- CAPTCHA Section for Admin -->
                <div style="display: flex; gap: 12px; margin-bottom: 15px; align-items: flex-start;">
                    <div style="background: #0f1419; border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 6px; padding: 5px; flex-shrink: 0;">
                        <img id="captchaImage" src="" alt="CAPTCHA Image" style="width: 180px; height: 60px; display: block; background: #0f1419; border-radius: 4px;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                        <input type="text" name="captcha_input" id="captchaInput" placeholder="Enter Captcha Code" required autocomplete="off" style="padding: 10px 12px; background: #1a1f2e; border: 1px solid rgba(0, 212, 255, 0.2); color: #e4e6eb; border-radius: 6px; font-size: 0.9rem; transition: all 0.3s ease; font-family: 'Inter', sans-serif;">
                        <button type="button" onclick="refreshCaptcha()" style="background: transparent; border: 1px solid rgba(0, 212, 255, 0.3); color: #00d4ff; cursor: pointer; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; transition: all 0.3s ease; align-self: flex-end; font-family: 'Inter', sans-serif;">
                            <i class="fa-solid fa-rotate-right"></i> Refresh
                        </button>
                    </div>
                </div>

                <button type="submit" class="sc-btn sc-btn-primary" style="width: 100%;">
                    <i class="fa-solid fa-right-to-bracket"></i> Secure Login
                </button>
            </form>

            <div class="auth-links">
                Not Registered? <a href="{% url 'admin_panel:admin_register' %}">Create Admin Account</a>
            </div>

            <div class="auth-back">
                <a href="{% url 'continue_as' %}"><i class="fa-solid fa-arrow-left"></i> Back to Landing page</a>
            </div>
        </div>

    </div>
</div>

<script src="{% static 'core/js/password-toggle.js' %}"></script>
<script>
    function loadCaptcha() {
        fetch('{% url "admin_panel:admin_get_captcha" %}')
            .then(response => response.json())
            .then(data => {
                document.getElementById('captchaImage').src = data.captcha_image;
                document.getElementById('captchaInput').value = '';
            })
            .catch(error => console.error('Error loading CAPTCHA:', error));
    }

    function refreshCaptcha() {
        fetch('{% url "admin_panel:admin_refresh_captcha" %}')
            .then(response => response.json())
            .then(data => {
                document.getElementById('captchaImage').src = data.captcha_image;
                document.getElementById('captchaInput').value = '';
                document.getElementById('captchaInput').focus();
            })
            .catch(error => console.error('Error refreshing CAPTCHA:', error));
    }

    // Load CAPTCHA when page loads
    document.addEventListener('DOMContentLoaded', loadCaptcha);
</script>
